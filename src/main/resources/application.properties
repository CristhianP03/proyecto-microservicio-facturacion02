spring.application.name=microservicio-demo01

server.port=8081

# ??? BASE DE DATOS ????????????????????????????????????????????????????????????
#
# Para cambiar de entorno solo comenta/descomenta la lÌnea correspondiente:
#
# ?? LOCAL (IntelliJ + Docker Compose) ? ACTIVO ???????????????????????????????
#spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/microservicio_facturacion}
#
# ?? KUBERNETES ? comentado ????????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://postgres-db:5432/facturaciondb
#
# Nota: en Kubernetes el deployment.yaml define SPRING_DATASOURCE_URL
# autom·ticamente, asÌ que la lÌnea activa no importa al hacer push.
# Pero si quieres dejarlo explÌcito para mayor claridad, interc·mbialas.
# ?????????????????????????????????????????????????????????????????????????????
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ??? SWAGGER ??????????????????????????????????????????????????????????????????
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.groups.enabled=false
springdoc.cache.disabled=true

