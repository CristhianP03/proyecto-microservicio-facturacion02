<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FacturaPro | Sistema Contable</title>
    <link rel="stylesheet" href="/Css/style.css">
</head>
<body>

<header class="main-header">
    <div class="header-content">
        <h1>Factura<span>Pro</span></h1>
        <p>Gestión Transaccional de Ventas y Cobros</p>
    </div>
</header>

<main class="container">
    <div class="dashboard-grid">
        <section class="card">
            <header class="card-header"><h2>1. Registro de Venta</h2></header>
            <form id="formCrearVenta" class="card-body">
                <div class="form-group">
                    <label>ID Cliente</label>
                    <input type="number" id="idCliente" required placeholder="Ej. 101">
                </div>
                <div class="form-group">
                    <label>Monto Total ($)</label>
                    <input type="number" id="totalVenta" step="0.01" required placeholder="0.00">
                </div>
                <button type="submit" class="btn-primary">Registrar Venta</button>
            </form>
        </section>

        <section class="card">
            <header class="card-header"><h2>2. Documentos</h2></header>
            <div class="card-body">
                <form id="formGenerarFactura" class="form-group">
                    <label>Generar Factura desde Venta</label>
                    <div class="inline-group">
                        <input type="number" id="idVentaFactura" placeholder="ID Venta" required>
                        <button type="submit" class="btn-outline">Generar</button>
                    </div>
                </form>
                <button class="btn-secondary" id="btnListarVentas">Ver Todas las Ventas</button>
                <button class="btn-secondary" id="btnListarFacturas">Ver Todas las Facturas</button>
            </div>
        </section>

        <section class="card">
            <header class="card-header"><h2>3. Registro de Pago</h2></header>
            <form id="formRegistrarPago" class="card-body">
                <div class="form-group">
                    <label>ID Factura</label>
                    <input type="number" id="idFacturaPago" required placeholder="ID Factura">
                </div>
                <div class="form-group">
                    <label>Monto a Pagar ($)</label>
                    <input type="number" id="montoPago" step="0.01" required placeholder="0.00">
                </div>
                <button type="submit" class="btn-success">Verify Pay</button>
            </form>
        </section>
    </div>

    <section class="results-container">
        <header class="results-header">
            <h3>Panel de Control y Resultados</h3>
            <span id="status-badge" class="badge">Sincronizado</span>
        </header>
        <div id="resultado" class="table-responsive">
            <p class="empty-state">Inicie una operación para ver resultados.</p>
        </div>
    </section>
</main>

<script src="/Js/app.js"></script>
</body>
</html>
