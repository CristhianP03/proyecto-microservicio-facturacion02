name: Deploy Consumo to Azure AKS

on:
  push:
    branches: [ "feature-consumo" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v3

      - name: 2. Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 3. Compilar con Maven
        run: mvn clean package -DskipTests

      - name: 4. Login en Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 5. Build y Push de imagen a ACR
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/microservicio-consumo:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/microservicio-consumo:latest

      - name: 6. Login en Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 7. Configurar contexto AKS
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AZURE_CLUSTER_NAME }}

      - name: 8. Desplegar en AKS
        uses: azure/k8s-deploy@v1
        with:
          manifests: |
            k8s/consumo-deployment.yaml
            k8s/consumo-service.yaml
          images: |
            ${{ secrets.ACR_LOGIN_SERVER }}/microservicio-consumo:latest