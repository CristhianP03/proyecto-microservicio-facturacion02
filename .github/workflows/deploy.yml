name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v3

      - name: 2. Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Build project
        run: mvn clean package -DskipTests

      - name: 4. Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 5. Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/facturacion:latest .

      - name: 6. Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/facturacion:latest

      - name: 7. Deploy on Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AZURE_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
	script: |
  	cd proyecto-azure
  	docker-compose down
  	docker-compose pull
  	docker-compose up -d --force-recreate